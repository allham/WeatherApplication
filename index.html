<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta device-widthdevice-widthname="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="index.js" defer async type="module"></script>
</head>
<body>
    <div class="container">
        <h1>Weather App</h1>
        <form>
            <input type="text" placeholder="Enter City Name" id="city-input">
            <input type="submit" value="Get Weather">
        </form>
        <div class="weather-data">
            <div class="icon">
                <img src="http://openweathermap.org/img/wn/01n.png" alt="weather icon">
            </div>
            <div class="temperature">22°C</div>
            <div class="description">Sunny</div>
            <div class="details">
                <div>Feels like : 22°C</div>
                <div>Humidity: 40%</div>
                <div>Wind speed:5m/s</div>
            </div>
        </div>
    </div>
    <p>made by: <span>hamdija alibegović</span></p>
</body>
</html>
